<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Garden Designer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 340px;
      min-width: 300px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 6px;
    }

    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: #666;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #999; }
    .upload-area input { display: none; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .photo-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.88rem; font-weight: 500; }

    select, input[type="text"], input[type="number"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fafafa;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #666;
      background: white;
    }
    textarea { resize: vertical; min-height: 70px; }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      font-weight: 400;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── MAIN PANEL ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
      text-align: center;
      line-height: 2;
    }

    .result-section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }
    .result-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 12px;
    }
    .result-section p, .result-section li {
      font-size: 0.93rem;
      color: #333;
      line-height: 1.65;
    }
    .result-section ul { padding-left: 18px; }
    .result-section li { margin-bottom: 4px; }

    .render-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .render-slot {
      aspect-ratio: 4/3;
      background: #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.8rem;
      text-align: center;
      position: relative;
      padding: 8px;
    }
    .render-slot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .render-slot .label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 1;
    }
    .render-slot.generating {
      flex-direction: column;
      gap: 8px;
    }

    .status {
      font-size: 0.85rem;
      color: #666;
      padding: 10px 14px;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .status.error { color: #c0392b; background: #fff5f5; border-color: #fcc; }
    .status.success { color: #27ae60; background: #f5fff8; border-color: #ace; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    .spinner-lg {
      width: 20px; height: 20px;
      border: 2px solid #ddd;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>AI Garden Designer</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div>
      <h2>1. Photos</h2>
      <div class="upload-area" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(this)">
        <div>Click to upload garden photos</div>
        <div style="font-size:0.8rem;margin-top:4px;color:#aaa">Up to 6 images</div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>

    <div>
      <h2>2. Your Garden</h2>
      <div style="display:flex;flex-direction:column;gap:12px">

        <div class="field">
          <label>Approximate size</label>
          <input type="text" id="dimensions" placeholder="e.g. 12m x 8m" />
        </div>

        <div class="field">
          <label>Orientation</label>
          <select id="orientation">
            <option value="">Select...</option>
            <option>North-facing</option>
            <option>South-facing</option>
            <option>East-facing</option>
            <option>West-facing</option>
            <option>Not sure</option>
          </select>
        </div>

        <div class="field">
          <label>Design style</label>
          <select id="style">
            <option value="">Select...</option>
            <option>Modern / contemporary</option>
            <option>Cottage / traditional</option>
            <option>Family garden</option>
            <option>Low maintenance</option>
            <option>Flower-rich</option>
            <option>Entertaining / social</option>
          </select>
        </div>

        <div class="field">
          <label>Budget (£)</label>
          <input type="number" id="budget" placeholder="e.g. 5000" />
        </div>

        <div class="field">
          <label>Maintenance level</label>
          <select id="maintenance">
            <option value="">Select...</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>

        <div class="field">
          <label>Features wanted</label>
          <div class="checkbox-group">
            <label><input type="checkbox" value="lawn"> Lawn</label>
            <label><input type="checkbox" value="patio"> Patio</label>
            <label><input type="checkbox" value="bbq"> BBQ area</label>
            <label><input type="checkbox" value="kids"> Kids zone</label>
            <label><input type="checkbox" value="pets"> Pet friendly</label>
            <label><input type="checkbox" value="lighting"> Lighting</label>
            <label><input type="checkbox" value="privacy"> Privacy</label>
            <label><input type="checkbox" value="flowers"> Flowers</label>
          </div>
        </div>

        <div class="field">
          <label>Anything else to know?</label>
          <textarea id="notes" placeholder="Existing trees to keep, slopes, drainage issues..."></textarea>
        </div>

      </div>
    </div>

    <button class="btn" id="runBtn" onclick="runAnalysis()">Analyse my garden</button>

  </aside>

  <!-- ── MAIN PANEL ── -->
  <main class="main" id="mainPanel">
    <div class="placeholder">
      Upload photos and fill in your brief,<br>then click Analyse my garden.
    </div>
  </main>

</div>

<script>
  const PROXY = 'https://garden-designer-eight.vercel.app/api/proxy'

  let uploadedPhotos = []

  // ── PHOTO HANDLING ───────────────────────────────────────
  function handlePhotos(input) {
    const files = Array.from(input.files).slice(0, 6)
    uploadedPhotos = []
    const grid = document.getElementById('photoGrid')
    grid.innerHTML = ''

    files.forEach(file => {
      const reader = new FileReader()
      reader.onload = e => {
        const previewImg = document.createElement('img')
        previewImg.src = e.target.result
        grid.appendChild(previewImg)

        const image = new Image()
        image.onload = () => {
          // OpenAI requires square PNG — use 512x512
          const size = 512
          const canvas = document.createElement('canvas')
          canvas.width = size
          canvas.height = size
          const ctx = canvas.getContext('2d')
          ctx.clearRect(0, 0, size, size)
          const scale = Math.max(size / image.width, size / image.height)
          const sw = image.width * scale
          const sh = image.height * scale
          const ox = (size - sw) / 2
          const oy = (size - sh) / 2
          ctx.drawImage(image, ox, oy, sw, sh)
          const pngDataUrl = canvas.toDataURL('image/png')
          const base64 = pngDataUrl.split(',')[1]
          const sizeKB = Math.round(base64.length * 0.75 / 1024)
          console.log(`Image ready: 512x512 square PNG, ~${sizeKB}KB`)
          uploadedPhotos.push({ base64, type: 'image/png' })
        }
        image.src = e.target.result
      }
      reader.readAsDataURL(file)
    })
  }

  // ── HELPERS ──────────────────────────────────────────────
  function getFeatures() {
    return Array.from(document.querySelectorAll('.checkbox-group input:checked'))
      .map(cb => cb.value).join(', ')
  }

  function setStatus(msg, type = '') {
    const main = document.getElementById('mainPanel')
    let el = document.getElementById('statusBar')
    if (!el) {
      el = document.createElement('div')
      el.id = 'statusBar'
      main.prepend(el)
    }
    el.className = `status ${type}`
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg
  }

  function buildSection(title, content) {
    const sec = document.createElement('div')
    sec.className = 'result-section'
    sec.innerHTML = `<h3>${title}</h3><div>${content}</div>`
    return sec
  }

  // Strip HTML tags and collapse whitespace to plain text
  function toPlainText(html) {
    return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim()
  }

  // ── API CALLS ────────────────────────────────────────────
  async function callClaude(prompt, images = []) {
    const content = []
    images.forEach(img => content.push({
      type: 'image',
      source: { type: 'base64', media_type: img.type, data: img.base64 }
    }))
    content.push({ type: 'text', text: prompt })

    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service: 'anthropic',
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        messages: [{ role: 'user', content }]
      })
    })
    const data = await res.json()
    if (data.error) throw new Error(data.error.message || 'Anthropic error')
    return data.content[0].text
  }

  async function generateRender(prompt, imageBase64) {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service: 'openai-image',
        prompt,
        imageBase64,
        imageType: 'image/png',
      })
    })
    const data = await res.json()
    if (data.error) throw new Error(data.error.message || 'OpenAI error')
    const img = data.data?.[0]
    if (!img) throw new Error('No image returned')
    return img.url || `data:image/png;base64,${img.b64_json}`
  }

  // Fetch a render result URL and return it as a base64 PNG string.
  // If the result was already a data URI we extract the base64 directly;
  // otherwise we fetch the remote URL and convert via a canvas.
  async function urlToBase64(src) {
    if (src.startsWith('data:image/png;base64,')) {
      return src.split(',')[1]
    }

    // Fetch the remote image and draw onto a canvas to get a PNG base64
    const img = await new Promise((resolve, reject) => {
      const el = new Image()
      el.crossOrigin = 'anonymous'
      el.onload = () => resolve(el)
      el.onerror = () => reject(new Error('Could not load render image for chaining'))
      el.src = src
    })

    const canvas = document.createElement('canvas')
    canvas.width = img.naturalWidth || 1024
    canvas.height = img.naturalHeight || 1024
    const ctx = canvas.getContext('2d')
    ctx.drawImage(img, 0, 0)
    const dataUrl = canvas.toDataURL('image/png')
    return dataUrl.split(',')[1]
  }

  // ── PARSE CLAUDE RESPONSE ─────────────────────────────────
  function parseAnalysis(text) {
    const sectionNames = [
      'SITE ANALYSIS', 'OPPORTUNITIES', 'CONSTRAINTS',
      'CONCEPT', 'PLANTING HIGHLIGHTS', 'COST BREAKDOWN', 'MAINTENANCE NOTES'
    ]
    return sectionNames.reduce((results, name, i) => {
      const start = text.indexOf(name)
      if (start === -1) return results
      const nextName = sectionNames.slice(i + 1).find(n => text.indexOf(n) > start)
      const end = nextName ? text.indexOf(nextName) : text.length
      const content = text.slice(start + name.length, end).trim()
      const lines = content.split('\n').filter(l => l.trim())
      const hasBullets = lines.some(l => /^[-•]/.test(l.trim()))
      const html = hasBullets
        ? '<ul>' + lines.map(l => `<li>${l.replace(/^[-•]\s*/, '')}</li>`).join('') + '</ul>'
        : lines.map(l => `<p>${l}</p>`).join('')
      results.push({ title: name.charAt(0) + name.slice(1).toLowerCase(), html })
      return results
    }, [])
  }

  // ── IMAGE PROMPT BUILDER ──────────────────────────────────
  //
  // Extracts the most visually relevant content from the Claude sections
  // and composes a detailed, structured prompt for the OpenAI image edit.
  //
  function buildImagePrompt(sections, style, features, lighting) {
    const get = (title) => {
      const s = sections.find(s => s.title.toLowerCase() === title.toLowerCase())
      return s ? toPlainText(s.html) : ''
    }

    // Condense planting highlights to a compact comma list (strip filler words)
    const plantingRaw = get('Planting highlights')
    // Each line is typically "Plant name - reason". We keep just the plant names.
    const plants = plantingRaw
      .split(/[,.]/)
      .map(p => p.replace(/\s*[-–]\s*.+/, '').trim())
      .filter(p => p.length > 2 && p.length < 60)
      .slice(0, 6)
      .join(', ')

    const concept     = get('Concept')
    const siteAnalysis = get('Site analysis')
    const maintenance  = get('Maintenance notes')

    // Extract hard landscaping clues from concept + site analysis
    const hardLandscaping = [concept, siteAnalysis]
      .join(' ')
      .match(/\b(patio|path|gravel|decking|paving|pergola|raised bed|wall|fence|steps|terrace|sleepers|edging)\b/gi)
    const hardFeatures = hardLandscaping
      ? [...new Set(hardLandscaping.map(w => w.toLowerCase()))].join(', ')
      : ''

    const featuresLine = features ? `Features: ${features}.` : ''
    const hardLine     = hardFeatures ? `Hard landscaping: ${hardFeatures}.` : ''
    const plantsLine   = plants ? `Key plants: ${plants}.` : ''
    const maintLine    = maintenance ? `Maintenance level: ${maintenance.split('.')[0]}.` : ''

    return [
      `Photorealistic garden design render of a redesigned ${style || 'contemporary'} UK garden.`,
      concept,
      hardLine,
      plantsLine,
      featuresLine,
      maintLine,
      lighting.description,
      `Preserve the house walls, roofline, fences and all boundary structures exactly as in the original photo.`,
      `No people. No text. No watermarks.`,
    ].filter(Boolean).join(' ')
  }

  // Re-light prompt for renders 2 and 3.
  // The design is locked to render 1 — only lighting and atmosphere change.
  // Locking instructions come first and are maximally specific; the lighting
  // change is a single clause at the end so the model treats it as a narrow
  // modification rather than a new creative brief.
  function buildRelightPrompt(style, features, lighting) {
    return [
      `IMPORTANT: Do not change the garden design. This is a relighting only.`,
      `Copy the input image exactly: every plant species, plant position, plant size, and planting arrangement must be pixel-for-pixel identical to the input image.`,
      `The path shape, path material, and path position must be exactly as in the input image.`,
      `The pergola, if present, must stay in exactly the same position and with the same structure as in the input image.`,
      `All furniture, pots, and decorative objects must remain in exactly the same positions as in the input image.`,
      `The lawn shape and all border shapes must be exactly as in the input image.`,
      `The house walls, roofline, conservatory, windows, fences, and all boundary structures must be exactly as in the input image.`,
      `The only permitted change is the lighting and sky: apply ${lighting.label.toLowerCase()} conditions — ${lighting.description}`,
      `No people. No text. No watermarks.`,
    ].join(' ')
  }

  // ── RENDER SLOT HELPERS ───────────────────────────────────
  function showSlotImage(slot, imgUrl, label) {
    const img = document.createElement('img')
    img.src = imgUrl
    slot.innerHTML = ''
    slot.classList.remove('generating')
    slot.appendChild(img)
    const lbl = document.createElement('div')
    lbl.className = 'label'
    lbl.textContent = label
    slot.appendChild(lbl)
  }

  function showSlotError(slot, message) {
    slot.classList.remove('generating')
    slot.innerHTML = `<div style="color:#c0392b;font-size:0.78rem;padding:8px">Failed: ${message}</div>`
  }

  // ── MAIN FLOW ─────────────────────────────────────────────
  async function runAnalysis() {
    const btn  = document.getElementById('runBtn')
    const main = document.getElementById('mainPanel')

    if (uploadedPhotos.length === 0) {
      alert('Please upload at least one photo of your garden.')
      return
    }

    // Wait for canvas conversion to finish (it's async)
    let attempts = 0
    while (uploadedPhotos.some(p => !p.base64) && attempts < 30) {
      await new Promise(r => setTimeout(r, 100))
      attempts++
    }

    main.innerHTML = ''
    btn.disabled = true

    try {
      // ── Step 1: Site analysis via Claude ──────────────────
      setStatus('Analysing your garden...', 'loading')

      const brief = `
You are an expert UK garden designer. Analyse the garden photos provided and the brief below.

Brief:
- Dimensions: ${document.getElementById('dimensions').value || 'unknown'}
- Orientation: ${document.getElementById('orientation').value || 'unknown'}
- Style: ${document.getElementById('style').value || 'not specified'}
- Budget: £${document.getElementById('budget').value || 'not specified'}
- Maintenance: ${document.getElementById('maintenance').value || 'not specified'}
- Features wanted: ${getFeatures() || 'none specified'}
- Notes: ${document.getElementById('notes').value || 'none'}

Respond in this exact format with these exact section headings:

SITE ANALYSIS
[2-3 sentences describing what you can see: approximate size, orientation clues, existing features, condition]

OPPORTUNITIES
[3-5 bullet points of design opportunities]

CONSTRAINTS
[2-4 bullet points of challenges or things to work around]

CONCEPT
[2-3 sentences describing the recommended design approach for this specific garden and brief]

PLANTING HIGHLIGHTS
[4-6 recommended plants with brief reason for each, suitable for the style and conditions]

COST BREAKDOWN
[6-8 line items with approximate £ costs adding up to roughly the stated budget]

MAINTENANCE NOTES
[3-4 sentences on seasonal tasks for the chosen maintenance level]
      `.trim()

      const analysis  = await callClaude(brief, uploadedPhotos)
      const sections  = parseAnalysis(analysis)
      const styleVal  = document.getElementById('style').value || 'contemporary'
      const features  = getFeatures()

      setStatus('Analysis complete. Generating render 1 of 3...', 'loading')
      sections.forEach(s => main.appendChild(buildSection(s.title, s.html)))

      // ── Step 2: Render grid setup ─────────────────────────
      const renderSection = document.createElement('div')
      renderSection.className = 'result-section'
      renderSection.innerHTML = `<h3>Garden Renders</h3><div class="render-grid" id="renderGrid"></div>`
      main.appendChild(renderSection)

      // ── Orientation-aware lighting ─────────────────────────
      //
      // Sun positions are fixed (UK summer):
      //   Morning: azimuth 090° (due east),  elevation ~15° (low)
      //   Midday:  azimuth 180° (due south), elevation ~52° (high)
      //   Evening: azimuth 270° (due west),  elevation ~15° (low)
      //
      // The viewpoint looks from the house into the garden, so the viewing
      // direction equals the garden-facing azimuth.
      //
      // Sun position relative to the scene:
      //   rel = (sun_azimuth - garden_azimuth + 360) % 360
      //
      //   rel   0° = sun directly ahead  → shoots toward viewer, backlit scene
      //   rel  90° = sun to scene RIGHT  → rakes from right, shadows point left
      //   rel 180° = sun directly behind → front-lights scene, shadows point away
      //   rel 270° = sun to scene LEFT   → rakes from left, shadows point right
      //
      // Shadows always point opposite to the sun's scene-relative direction.
      // Low sun (15°) = long shadows. High sun (52°) = short shadows.

      const ORIENTATION_LIGHTING = {

        'South-facing': {
          // Viewing direction 180°
          // Morning  090°: rel (90-180+360)%360  = 270° → sun LEFT,      shadows RIGHT
          // Midday   180°: rel (180-180+360)%360 = 0°   → sun AHEAD HIGH, short shadows toward viewer
          // Evening  270°: rel (270-180+360)%360 = 90°  → sun RIGHT,     shadows LEFT
          morning: 'Sun is due east at low elevation (approximately 15 degrees). Light enters the scene from the left. Long shadows point to the right across the lawn and path. Warm golden raking light from the left. Dew on foliage. Cool fresh atmosphere. Pale warm sky to the left.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), directly ahead of the viewpoint. Bright high sun ahead. Short shadows point toward the viewer. High-contrast vivid colours. Clear blue sky with sun high and central.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees). Light enters the scene from the right. Long shadows point to the left across the lawn and path. Warm amber raking light from the right. Golden-hour glow on right-facing surfaces. Warm amber sky to the right.',
        },

        'North-facing': {
          // Viewing direction 0°
          // Morning  090°: rel (90-0+360)%360   = 90°  → sun RIGHT,      shadows LEFT
          // Midday   180°: rel (180-0+360)%360  = 180° → sun BEHIND,     front-lights scene, shadows away
          // Evening  270°: rel (270-0+360)%360  = 270° → sun LEFT,       shadows RIGHT
          morning: 'Sun is due east at low elevation (approximately 15 degrees). Light enters the scene from the right. Long shadows point to the left across the lawn and path. Warm golden raking light from the right. Dew on foliage. Cool fresh atmosphere. Pale warm sky to the right.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), directly behind the viewpoint. Sun front-lights the entire scene. Garden evenly and fully illuminated. Short shadows point away from the viewer into the scene. Bright vivid colours. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees). Light enters the scene from the left. Long shadows point to the right across the lawn and path. Warm amber raking light from the left. Golden-hour glow on left-facing surfaces. Warm amber sky to the left.',
        },

        'East-facing': {
          // Viewing direction 90°
          // Morning  090°: rel (90-90+360)%360  = 0°   → sun AHEAD LOW,  shoots toward viewer
          // Midday   180°: rel (180-90+360)%360 = 90°  → sun RIGHT,      shadows LEFT
          // Evening  270°: rel (270-90+360)%360 = 180° → sun BEHIND,     front-lights scene, shadows away
          morning: 'Sun is due east at low elevation (approximately 15 degrees), directly ahead of the viewpoint. Sun shoots straight toward the viewer at a very low angle. Dramatic into-sun scene: strong backlit warm rim light on all plants and structures. Long shadows point directly toward the viewer. Vivid orange sky on the horizon ahead. Lens flare.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees). Light enters the scene from the right. Short shadows point to the left across the lawn and path. Bright lateral light from the right. Clear blue sky. Vivid colours.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), directly behind the viewpoint. Sun front-lights the entire scene from behind the viewer. Warm golden low light across all surfaces. Long shadows point away from the viewer into the far end of the scene. Pale amber sky ahead.',
        },

        'West-facing': {
          // Viewing direction 270°
          // Morning  090°: rel (90-270+360)%360  = 180° → sun BEHIND,    front-lights scene, shadows away
          // Midday   180°: rel (180-270+360)%360 = 270° → sun LEFT,      shadows RIGHT
          // Evening  270°: rel (270-270+360)%360 = 0°   → sun AHEAD LOW, shoots toward viewer
          morning: 'Sun is due east at low elevation (approximately 15 degrees), directly behind the viewpoint. Sun front-lights the scene from behind the viewer. Cool early light across the garden. Long shadows point away from the viewer into the far end of the scene. Pale cool sky ahead. Dew on foliage.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees). Light enters the scene from the left. Short shadows point to the right across the lawn and path. Bright lateral light from the left. Clear blue sky. Vivid colours.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), directly ahead of the viewpoint. Sun shoots straight toward the viewer at a very low angle. Dramatic into-sun scene: strong backlit golden rim light on all plants and structures. Long shadows point directly toward the viewer. Vivid orange and amber sky on the horizon ahead. Lens flare. Atmospheric haze.',
        },

        'North-east-facing': {
          // Viewing direction 45°
          // Morning  090°: rel (90-45+360)%360   = 45°  → sun 45° RIGHT of ahead, near-frontal from right
          // Midday   180°: rel (180-45+360)%360  = 135° → sun 135° RIGHT (behind-right), rakes rear-right, shadows forward-left
          // Evening  270°: rel (270-45+360)%360  = 225° → sun 225° (behind-left, 45° past directly behind), garden in shade
          morning: 'Sun is due east at low elevation (approximately 15 degrees), 45 degrees to the right of the viewing direction. Warm near-frontal raking light entering from the right-front. Long shadows point to the left and slightly away. Warm golden glow on right-facing surfaces. Dew on foliage.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), 135 degrees to the right — behind and to the right of the viewpoint. Light enters from the rear-right. Short shadows point forward and to the left. Bright well-lit scene. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), 225 degrees around — behind and to the left of the viewpoint. No direct sunlight enters the garden from the front. Garden receives indirect warm ambient light. Cool open shade across the lawn. Warm amber sky glow visible to the upper-left. Garden lights illuminate the path.',
        },

        'North-west-facing': {
          // Viewing direction 315°
          // Morning  090°: rel (90-315+360)%360  = 135° → sun 135° RIGHT (behind-right), garden in shade
          // Midday   180°: rel (180-315+360)%360 = 225° → sun 225° (behind-left), rakes rear-left, shadows forward-right
          // Evening  270°: rel (270-315+360)%360 = 315° → sun 315° (45° LEFT of ahead), near-frontal from left
          morning: 'Sun is due east at low elevation (approximately 15 degrees), 135 degrees to the right — behind and to the right of the viewpoint. No direct sunlight enters the garden from the front. Cool indirect early light across the garden. Long soft shadows. Pale cool sky ahead. Dew on foliage.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), 225 degrees around — behind and to the left of the viewpoint. Light enters from the rear-left. Short shadows point forward and to the right. Bright well-lit scene. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), 45 degrees to the left of the viewing direction. Warm near-frontal raking light entering from the left-front. Long shadows point to the right and slightly away. Warm golden-hour glow on left-facing surfaces. Atmospheric amber sky to the left-front.',
        },

        'South-east-facing': {
          // Viewing direction 135°
          // Morning  090°: rel (90-135+360)%360  = 315° → sun 315° (45° LEFT of ahead), near-frontal from left
          // Midday   180°: rel (180-135+360)%360 = 45°  → sun 45° RIGHT of ahead, near-frontal from right
          // Evening  270°: rel (270-135+360)%360 = 135° → sun 135° RIGHT (behind-right), garden in shade
          morning: 'Sun is due east at low elevation (approximately 15 degrees), 45 degrees to the left of the viewing direction. Warm near-frontal raking light entering from the left-front. Long shadows point to the right and slightly away. Warm golden glow on left-facing surfaces. Dew on foliage. Fresh morning atmosphere.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), 45 degrees to the right of the viewing direction. Bright near-frontal light from the right-front. Short shadows point to the left and slightly away. Very bright vivid scene. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), 135 degrees to the right — behind and to the right of the viewpoint. No direct sunlight enters the garden from the front. Garden receives indirect warm ambient light. Open shade across the lawn. Warm amber sky glow visible to the upper-right. Garden lights illuminate the path.',
        },

        'South-west-facing': {
          // Viewing direction 225°
          // Morning  090°: rel (90-225+360)%360  = 225° → sun 225° (behind-left), garden in shade
          // Midday   180°: rel (180-225+360)%360 = 315° → sun 315° (45° LEFT of ahead), near-frontal from left
          // Evening  270°: rel (270-225+360)%360 = 45°  → sun 45° RIGHT of ahead, near-frontal from right
          morning: 'Sun is due east at low elevation (approximately 15 degrees), 225 degrees around — behind and to the left of the viewpoint. No direct sunlight enters the garden from the front. Cool indirect early light across the garden. Long soft shadows. Pale cool sky ahead. Dew on foliage.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), 45 degrees to the left of the viewing direction. Bright near-frontal light from the left-front. Short shadows point to the right and slightly away. Very bright vivid scene. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), 45 degrees to the right of the viewing direction. Warm near-frontal raking light entering from the right-front. Long shadows point to the left and slightly away. Warm golden-hour glow on right-facing surfaces. Atmospheric amber sky to the right-front.',
        },

        'Not sure': {
          morning: 'Sun is low in the sky (approximately 15 degrees elevation). Warm golden raking light from one side. Long shadows across the lawn and path. Dew on foliage. Cool fresh atmosphere.',
          midday:  'Sun is high in the sky (approximately 52 degrees elevation). Short crisp shadows. Bright vivid colours. Clear blue sky.',
          evening: 'Sun is low in the sky (approximately 15 degrees elevation). Warm amber raking light from one side. Long shadows across the garden. Golden-hour glow. Garden lighting beginning to illuminate the path.',
        },
      }

      // Default fallback if orientation is blank or unrecognised
      const DEFAULT_LIGHTING = ORIENTATION_LIGHTING['Not sure']

      const orientationVal = document.getElementById('orientation').value || 'Not sure'
      const lighting = ORIENTATION_LIGHTING[orientationVal] || DEFAULT_LIGHTING

      const timeOfDay = [
        { id: 'slot-morning',   label: 'Morning',   description: lighting.morning },
        { id: 'slot-afternoon', label: 'Afternoon',  description: lighting.midday  },
        { id: 'slot-evening',   label: 'Evening',    description: lighting.evening },
      ]

      const grid = document.getElementById('renderGrid')
      timeOfDay.forEach(({ id, label }) => {
        const slot = document.createElement('div')
        slot.className = 'render-slot generating'
        slot.id = id
        slot.innerHTML = `<div class="spinner-lg"></div><div>${label}</div>`
        grid.appendChild(slot)
      })

      const basePhoto  = uploadedPhotos[0]
      const [morning, afternoon, evening] = timeOfDay

      // ── Step 3: Render 1 (morning) with the original photo ──
      // Uses the full transformation prompt — this establishes the design.
      const morningPrompt = buildImagePrompt(sections, styleVal, features, morning)
      console.log('Render 1 prompt:', morningPrompt)

      let render1Url
      try {
        render1Url = await generateRender(morningPrompt, basePhoto.base64)
        showSlotImage(document.getElementById(morning.id), render1Url, morning.label)
      } catch (err) {
        showSlotError(document.getElementById(morning.id), err.message)
        // Fall through — renders 2 and 3 will fall back to the original photo
      }

      setStatus('Render 1 complete. Generating renders 2 and 3...', 'loading')

      // Convert render 1 to base64 for chaining; fall back to original photo if it failed
      let chainBase64 = basePhoto.base64
      if (render1Url) {
        try {
          chainBase64 = await urlToBase64(render1Url)
        } catch (err) {
          console.warn('Could not convert render 1 for chaining, falling back to original photo:', err.message)
        }
      }

      // ── Step 4: Renders 2 and 3 in parallel, chained off render 1 ──
      // Uses a shorter re-lighting prompt since the design is already established.
      await Promise.all([afternoon, evening].map(async (tod) => {
        const slot   = document.getElementById(tod.id)
        const prompt = buildRelightPrompt(styleVal, features, tod)
        console.log(`Render (${tod.label}) prompt:`, prompt)
        try {
          const imgUrl = await generateRender(prompt, chainBase64)
          showSlotImage(slot, imgUrl, tod.label)
        } catch (err) {
          showSlotError(slot, err.message)
        }
      }))

      setStatus('Done.', 'success')

    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error')
      console.error(err)
    } finally {
      btn.disabled = false
    }
  }
</script>

</body>
</html>
