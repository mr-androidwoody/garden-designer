<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Garden Designer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 340px;
      min-width: 300px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 6px;
    }

    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: #666;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #999; }
    .upload-area input { display: none; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .photo-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.88rem; font-weight: 500; }

    select, input[type="text"], input[type="number"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fafafa;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #666;
      background: white;
    }
    textarea { resize: vertical; min-height: 70px; }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      font-weight: 400;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── MAIN PANEL ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1rem;
      text-align: center;
      line-height: 2;
    }

    .result-section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }
    .result-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 12px;
    }
    .result-section p, .result-section li {
      font-size: 0.93rem;
      color: #333;
      line-height: 1.65;
    }
    .result-section ul { padding-left: 18px; }
    .result-section li { margin-bottom: 4px; }

    .render-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .render-slot {
      aspect-ratio: 4/3;
      background: #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.8rem;
      text-align: center;
      position: relative;
      padding: 8px;
    }
    .render-slot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .render-slot .label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 1;
    }
    .render-slot.generating {
      flex-direction: column;
      gap: 8px;
    }

    .status {
      font-size: 0.85rem;
      color: #666;
      padding: 10px 14px;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .status.error { color: #c0392b; background: #fff5f5; border-color: #fcc; }
    .status.success { color: #27ae60; background: #f5fff8; border-color: #ace; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    .spinner-lg {
      width: 20px; height: 20px;
      border: 2px solid #ddd;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GARDEN PLAN ── */
    .plan-wrap { width: 100%; max-width: 700px; margin: 0 auto; }
    .plan-wrap svg { width: 100%; height: auto; display: block; border-radius: 6px; }
    .plan-note { font-size: 0.78rem; color: #aaa; text-align: center; margin-top: 8px; font-style: italic; }
    .plan-legend { display: flex; flex-wrap: wrap; gap: 10px 20px; margin-top: 14px; font-size: 0.82rem; color: #555; }
    .plan-legend-item { display: flex; align-items: center; gap: 6px; }
    .plan-legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; }
  </style>
</head>
<body>

<header>AI Garden Designer</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div>
      <h2>1. Photos</h2>
      <div class="upload-area" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(this)">
        <div>Click to upload garden photos</div>
        <div style="font-size:0.8rem;margin-top:4px;color:#aaa">Up to 6 images</div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>

    <div>
      <h2>2. Your Garden</h2>
      <div style="display:flex;flex-direction:column;gap:12px">

        <div class="field">
          <label>Approximate size</label>
          <input type="text" id="dimensions" placeholder="e.g. 12m x 8m" />
        </div>

        <div class="field">
          <label>Orientation</label>
          <select id="orientation">
            <option value="">Select...</option>
            <option>North-facing</option>
            <option>North-east-facing</option>
            <option>East-facing</option>
            <option>South-east-facing</option>
            <option>South-facing</option>
            <option>South-west-facing</option>
            <option>West-facing</option>
            <option>North-west-facing</option>
            <option>Not sure</option>
          </select>
        </div>

        <div class="field">
          <label>Design style</label>
          <select id="style">
            <option value="">Select...</option>
            <option>Modern / contemporary</option>
            <option>Cottage / traditional</option>
            <option>Family garden</option>
            <option>Low maintenance</option>
            <option>Flower-rich</option>
            <option>Entertaining / social</option>
          </select>
        </div>

        <div class="field">
          <label>Budget (£)</label>
          <input type="number" id="budget" placeholder="e.g. 5000" />
        </div>

        <div class="field">
          <label>Maintenance level</label>
          <select id="maintenance">
            <option value="">Select...</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>

        <div class="field">
          <label>Features wanted</label>
          <div class="checkbox-group">
            <label><input type="checkbox" value="lawn"> Lawn</label>
            <label><input type="checkbox" value="patio"> Patio</label>
            <label><input type="checkbox" value="bbq"> BBQ area</label>
            <label><input type="checkbox" value="kids"> Kids zone</label>
            <label><input type="checkbox" value="pets"> Pet friendly</label>
            <label><input type="checkbox" value="lighting"> Lighting</label>
            <label><input type="checkbox" value="privacy"> Privacy</label>
            <label><input type="checkbox" value="flowers"> Flowers</label>
          </div>
        </div>

        <div class="field">
          <label>Anything else to know?</label>
          <textarea id="notes" placeholder="Existing trees to keep, slopes, drainage issues..."></textarea>
        </div>

      </div>
    </div>

    <button class="btn" id="runBtn" onclick="runAnalysis()">Analyse my garden</button>

  </aside>

  <!-- ── MAIN PANEL ── -->
  <main class="main" id="mainPanel">
    <div class="placeholder">
      Upload photos and fill in your brief,<br>then click Analyse my garden.
    </div>
  </main>

</div>

<script>
  const PROXY = 'https://garden-designer-eight.vercel.app/api/proxy'

  let uploadedPhotos = []

  // ── PHOTO HANDLING ───────────────────────────────────────
  function handlePhotos(input) {
    const files = Array.from(input.files).slice(0, 6)
    uploadedPhotos = []
    const grid = document.getElementById('photoGrid')
    grid.innerHTML = ''

    files.forEach(file => {
      const reader = new FileReader()
      reader.onload = e => {
        const previewImg = document.createElement('img')
        previewImg.src = e.target.result
        grid.appendChild(previewImg)

        const image = new Image()
        image.onload = () => {
          // OpenAI requires square PNG — use 512x512
          const size = 512
          const canvas = document.createElement('canvas')
          canvas.width = size
          canvas.height = size
          const ctx = canvas.getContext('2d')
          ctx.clearRect(0, 0, size, size)
          const scale = Math.max(size / image.width, size / image.height)
          const sw = image.width * scale
          const sh = image.height * scale
          const ox = (size - sw) / 2
          const oy = (size - sh) / 2
          ctx.drawImage(image, ox, oy, sw, sh)
          const pngDataUrl = canvas.toDataURL('image/png')
          const base64 = pngDataUrl.split(',')[1]
          const sizeKB = Math.round(base64.length * 0.75 / 1024)
          console.log(`Image ready: 512x512 square PNG, ~${sizeKB}KB`)
          uploadedPhotos.push({ base64, type: 'image/png' })
        }
        image.src = e.target.result
      }
      reader.readAsDataURL(file)
    })
  }

  // ── HELPERS ──────────────────────────────────────────────
  function getFeatures() {
    return Array.from(document.querySelectorAll('.checkbox-group input:checked'))
      .map(cb => cb.value).join(', ')
  }

  function setStatus(msg, type = '') {
    const main = document.getElementById('mainPanel')
    let el = document.getElementById('statusBar')
    if (!el) {
      el = document.createElement('div')
      el.id = 'statusBar'
      main.prepend(el)
    }
    el.className = `status ${type}`
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg
  }

  function buildSection(title, content) {
    const sec = document.createElement('div')
    sec.className = 'result-section'
    sec.innerHTML = `<h3>${title}</h3><div>${content}</div>`
    return sec
  }

  // Strip HTML tags and collapse whitespace to plain text
  function toPlainText(html) {
    return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim()
  }

  // ── API CALLS ────────────────────────────────────────────
  async function callClaude(prompt, images = []) {
    const content = []
    images.forEach(img => content.push({
      type: 'image',
      source: { type: 'base64', media_type: img.type, data: img.base64 }
    }))
    content.push({ type: 'text', text: prompt })

    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service: 'anthropic',
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        messages: [{ role: 'user', content }]
      })
    })
    const data = await res.json()
    if (data.error) throw new Error(data.error.message || 'Anthropic error')
    return data.content[0].text
  }

  async function generateRender(prompt, imageBase64) {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service: 'openai-image',
        prompt,
        imageBase64,
        imageType: 'image/png',
      })
    })
    const data = await res.json()
    if (data.error) throw new Error(data.error.message || 'OpenAI error')
    const img = data.data?.[0]
    if (!img) throw new Error('No image returned')
    return img.url || `data:image/png;base64,${img.b64_json}`
  }

  // Fetch a render result URL and return it as a base64 PNG string.
  // If the result was already a data URI we extract the base64 directly;
  // otherwise we fetch the remote URL and convert via a canvas.
  async function urlToBase64(src) {
    if (src.startsWith('data:image/png;base64,')) {
      return src.split(',')[1]
    }

    // Fetch the remote image and draw onto a canvas to get a PNG base64
    const img = await new Promise((resolve, reject) => {
      const el = new Image()
      el.crossOrigin = 'anonymous'
      el.onload = () => resolve(el)
      el.onerror = () => reject(new Error('Could not load render image for chaining'))
      el.src = src
    })

    const canvas = document.createElement('canvas')
    canvas.width = img.naturalWidth || 1024
    canvas.height = img.naturalHeight || 1024
    const ctx = canvas.getContext('2d')
    ctx.drawImage(img, 0, 0)
    const dataUrl = canvas.toDataURL('image/png')
    return dataUrl.split(',')[1]
  }

  // ── PARSE CLAUDE RESPONSE ─────────────────────────────────
  function parseAnalysis(text) {
    const sectionNames = [
      'SITE ANALYSIS', 'OPPORTUNITIES', 'CONSTRAINTS',
      'CONCEPT', 'PLANTING HIGHLIGHTS', 'COST BREAKDOWN', 'MAINTENANCE NOTES'
    ]
    return sectionNames.reduce((results, name, i) => {
      const start = text.indexOf(name)
      if (start === -1) return results
      const nextName = sectionNames.slice(i + 1).find(n => text.indexOf(n) > start)
      const end = nextName ? text.indexOf(nextName) : text.length
      const content = text.slice(start + name.length, end).trim()
      const lines = content.split('\n').filter(l => l.trim())
      const hasBullets = lines.some(l => /^[-•]/.test(l.trim()))
      const html = hasBullets
        ? '<ul>' + lines.map(l => `<li>${l.replace(/^[-•]\s*/, '')}</li>`).join('') + '</ul>'
        : lines.map(l => `<p>${l}</p>`).join('')
      results.push({ title: name.charAt(0) + name.slice(1).toLowerCase(), html })
      return results
    }, [])
  }

  // ── IMAGE PROMPT BUILDER ──────────────────────────────────
  //
  // Extracts the most visually relevant content from the Claude sections
  // and composes a detailed, structured prompt for the OpenAI image edit.
  //
  function buildImagePrompt(sections, style, features, lighting) {
    const get = (title) => {
      const s = sections.find(s => s.title.toLowerCase() === title.toLowerCase())
      return s ? toPlainText(s.html) : ''
    }

    // Condense planting highlights to a compact comma list (strip filler words)
    const plantingRaw = get('Planting highlights')
    // Each line is typically "Plant name - reason". We keep just the plant names.
    const plants = plantingRaw
      .split(/[,.]/)
      .map(p => p.replace(/\s*[-–]\s*.+/, '').trim())
      .filter(p => p.length > 2 && p.length < 60)
      .slice(0, 6)
      .join(', ')

    const concept     = get('Concept')
    const siteAnalysis = get('Site analysis')
    const maintenance  = get('Maintenance notes')

    // Extract hard landscaping clues from concept + site analysis
    const hardLandscaping = [concept, siteAnalysis]
      .join(' ')
      .match(/\b(patio|path|gravel|decking|paving|pergola|raised bed|wall|fence|steps|terrace|sleepers|edging)\b/gi)
    const hardFeatures = hardLandscaping
      ? [...new Set(hardLandscaping.map(w => w.toLowerCase()))].join(', ')
      : ''

    const featuresLine = features ? `Features: ${features}.` : ''
    const hardLine     = hardFeatures ? `Hard landscaping: ${hardFeatures}.` : ''
    const plantsLine   = plants ? `Key plants: ${plants}.` : ''
    const maintLine    = maintenance ? `Maintenance level: ${maintenance.split('.')[0]}.` : ''

    return [
      `Photorealistic garden design render of a redesigned ${style || 'contemporary'} UK garden.`,
      concept,
      hardLine,
      plantsLine,
      featuresLine,
      maintLine,
      lighting.description,
      `Preserve the house walls, roofline, fences and all boundary structures exactly as in the original photo.`,
      `No people. No text. No watermarks.`,
    ].filter(Boolean).join(' ')
  }

  // Re-light prompt for renders 2 and 3.
  // The design is locked to render 1 — only lighting and atmosphere change.
  // Locking instructions come first and are maximally specific; the lighting
  // change is a single clause at the end so the model treats it as a narrow
  // modification rather than a new creative brief.
  function buildRelightPrompt(style, features, lighting) {
    return [
      `IMPORTANT: Do not change the garden design. This is a relighting only.`,
      `Copy the input image exactly: every plant species, plant position, plant size, and planting arrangement must be pixel-for-pixel identical to the input image.`,
      `The path shape, path material, and path position must be exactly as in the input image.`,
      `The pergola, if present, must stay in exactly the same position and with the same structure as in the input image.`,
      `All furniture, pots, and decorative objects must remain in exactly the same positions as in the input image.`,
      `The lawn shape and all border shapes must be exactly as in the input image.`,
      `The house walls, roofline, conservatory, windows, fences, and all boundary structures must be exactly as in the input image.`,
      `The only permitted change is the lighting and sky: apply ${lighting.label.toLowerCase()} conditions — ${lighting.description}`,
      `No people. No text. No watermarks.`,
    ].join(' ')
  }

  // ── RENDER SLOT HELPERS ───────────────────────────────────
  function showSlotImage(slot, imgUrl, label) {
    const img = document.createElement('img')
    img.src = imgUrl
    slot.innerHTML = ''
    slot.classList.remove('generating')
    slot.appendChild(img)
    const lbl = document.createElement('div')
    lbl.className = 'label'
    lbl.textContent = label
    slot.appendChild(lbl)
  }

  function showSlotError(slot, message) {
    slot.classList.remove('generating')
    slot.innerHTML = `<div style="color:#c0392b;font-size:0.78rem;padding:8px">Failed: ${message}</div>`
  }

  // ── GARDEN PLAN: JSON FETCH ───────────────────────────────
  //
  // Asks Claude to produce a structured JSON layout of the garden design.
  // Coordinates are in a normalised 0-100 space (width=100, height=100).
  // The JS renderer scales them to actual SVG pixels.

  async function fetchGardenPlanJson(analysisText, brief) {
    const prompt = `
You are a garden designer producing a precise top-down plan layout in JSON format.

Garden brief:
- Dimensions: ${brief.dimensions || 'unknown (use a typical suburban UK garden, approximately 12m wide x 10m deep)'}
- Orientation: ${brief.orientation}
- Style: ${brief.style}
- Features: ${brief.features}

Garden design analysis:
${analysisText}

Produce a JSON object describing the garden layout. Use a coordinate space where:
- x: 0 = left boundary, 100 = right boundary (width)
- y: 0 = house end (top of plan), 100 = far boundary (bottom of plan)
- The house wall runs along y=0. The garden is below it.

The JSON must follow this exact schema:

{
  "gardenWidth": <number, metres>,
  "gardenDepth": <number, metres>,
  "northAngle": <number, degrees clockwise from up. 0=north is up, 90=north is right, 180=north is down, 270=north is left. Derive from orientation.>,
  "zones": [
    {
      "type": "lawn" | "patio" | "path" | "bed" | "structure" | "water" | "kids" | "gravel",
      "label": "<short display label>",
      "shape": "rect" | "polygon" | "ellipse",
      "points": [[x,y], ...],   // for polygon: 3+ points. for rect: [[x1,y1],[x2,y2]] (top-left, bottom-right). for ellipse: [[cx,cy],[rx,ry]]
      "plants": [               // only for type "bed" — list of plant symbols to draw
        { "symbol": "shrub" | "grass" | "perennial" | "tree" | "climber", "x": <0-100>, "y": <0-100>, "label": "<plant name>" }
      ]
    }
  ],
  "structures": [
    {
      "type": "pergola" | "shed" | "greenhouse" | "arch" | "wall" | "fence" | "gate" | "bbq" | "seating",
      "label": "<short label>",
      "x": <centre x>,
      "y": <centre y>,
      "w": <width in coordinate units>,
      "h": <depth in coordinate units>,
      "rotation": <degrees>
    }
  ]
}

Rules:
- Place the patio adjacent to the house (y between 0 and 25).
- Lawn typically occupies the middle area.
- Planting beds run along boundaries (x near 0 or 100, or y near 100).
- Path connects patio to far end or key features — use polygon with 4 points for a path strip.
- Every zone must fit within 0-100 on both axes.
- Include 3-8 zones and 0-4 structures depending on the design.
- For beds, include 2-4 plant symbols each, positioned within the bed polygon bounds.
- northAngle: south-facing garden = north is behind the viewer = 180. North-facing = 0. East-facing = 270. West-facing = 90.
- Respond with ONLY the raw JSON object. No markdown, no explanation, no code fences.
`.trim()

    const text = await callClaude(prompt, [])
    // Strip any accidental markdown fences
    const clean = text.replace(/```json|```/gi, '').trim()
    try {
      return JSON.parse(clean)
    } catch (e) {
      // Attempt to extract JSON object if there's surrounding text
      const match = clean.match(/\{[\s\S]*\}/)
      if (match) return JSON.parse(match[0])
      throw new Error('Could not parse garden plan JSON: ' + e.message)
    }
  }

  // ── GARDEN PLAN: SVG RENDERER ─────────────────────────────
  //
  // Takes the JSON layout and renders a detailed architectural-style
  // garden plan SVG with zone fills, hatching, plant symbols,
  // dimension lines, zone labels, and a north arrow.

  function renderGardenPlanSVG(plan, dimensionsInput) {
    const W = 660   // SVG canvas width  (px)
    const H = 560   // SVG canvas height (px)
    const PAD = 54  // padding for dimension lines and labels

    // Coordinate transform: 0-100 JSON space → SVG pixels
    const tx = x => PAD + (x / 100) * (W - PAD * 2)
    const ty = y => PAD + (y / 100) * (H - PAD * 2)
    const tw = w => (w / 100) * (W - PAD * 2)
    const th = h => (h / 100) * (H - PAD * 2)

    // Zone colour palette — earthy, architectural
    const ZONE_STYLE = {
      lawn:      { fill: '#c8ddb0', stroke: '#8aad5a', label: '#3a6b1a' },
      patio:     { fill: '#e8dcc8', stroke: '#b8a882', label: '#5c4a20' },
      path:      { fill: '#d4c4a0', stroke: '#a89060', label: '#5c4020' },
      bed:       { fill: '#b8d4a0', stroke: '#6a9940', label: '#2a5a10' },
      gravel:    { fill: '#ddd4b8', stroke: '#a89870', label: '#5c4820' },
      water:     { fill: '#b8d4e8', stroke: '#5090b8', label: '#105880' },
      kids:      { fill: '#e8d8b0', stroke: '#c0a040', label: '#7a5800' },
      structure: { fill: '#d8c8b8', stroke: '#907860', label: '#503020' },
    }

    // Plant symbol renderers — hand-drawn feel using SVG primitives
    function plantSymbol(sym, cx, cy, r = 7) {
      switch (sym) {
        case 'tree':
          return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#4a8a30" stroke="#2a5a18" stroke-width="1.2" opacity="0.85"/>
                  <circle cx="${cx}" cy="${cy}" r="${r * 0.45}" fill="#3a7a22" opacity="0.6"/>`
        case 'shrub':
          return `<ellipse cx="${cx}" cy="${cy}" rx="${r * 0.9}" ry="${r * 0.7}" fill="#6aaa40" stroke="#3a7a20" stroke-width="1" opacity="0.8"/>
                  <ellipse cx="${cx - r*0.3}" cy="${cy - r*0.2}" rx="${r * 0.55}" ry="${r * 0.45}" fill="#7aba50" opacity="0.6"/>`
        case 'grass':
          // Ornamental grass tuft: radiating lines
          return Array.from({length: 7}, (_, i) => {
            const a = (i / 7) * Math.PI * 2
            const ex = cx + Math.cos(a) * r
            const ey = cy + Math.sin(a) * r * 0.7
            return `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#8ab840" stroke-width="1.2" opacity="0.85"/>`
          }).join('') + `<circle cx="${cx}" cy="${cy}" r="2" fill="#6a9830"/>`
        case 'perennial':
          // Small star/flower shape
          return Array.from({length: 6}, (_, i) => {
            const a = (i / 6) * Math.PI * 2
            const ex = cx + Math.cos(a) * r
            const ey = cy + Math.sin(a) * r
            return `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#c060a0" stroke-width="1.3" opacity="0.8"/>`
          }).join('') + `<circle cx="${cx}" cy="${cy}" r="2.5" fill="#e080c0" opacity="0.9"/>`
        case 'climber':
          return `<path d="M${cx},${cy+r} Q${cx-r},${cy} ${cx},${cy-r} Q${cx+r},${cy} ${cx},${cy+r}" fill="none" stroke="#5a9030" stroke-width="1.5" opacity="0.8"/>
                  <circle cx="${cx}" cy="${cy - r}" r="2" fill="#8ac050"/>`
        default:
          return `<circle cx="${cx}" cy="${cy}" r="${r * 0.6}" fill="#888" opacity="0.5"/>`
      }
    }

    // Convert polygon points array to SVG points string
    function polyPoints(pts) {
      return pts.map(([x, y]) => `${tx(x)},${ty(y)}`).join(' ')
    }

    // Build zone shape path/element
    function zoneElement(zone) {
      const st = ZONE_STYLE[zone.type] || ZONE_STYLE.structure
      const fill = st.fill
      const stroke = st.stroke

      if (zone.shape === 'rect') {
        const [[x1, y1], [x2, y2]] = zone.points
        return `<rect x="${tx(x1)}" y="${ty(y1)}" width="${tw(x2-x1)}" height="${th(y2-y1)}"
                  fill="${fill}" stroke="${stroke}" stroke-width="1.5" rx="2"/>`
      }
      if (zone.shape === 'ellipse') {
        const [[cx, cy], [rx, ry]] = zone.points
        return `<ellipse cx="${tx(cx)}" cy="${ty(cy)}" rx="${tw(rx)}" ry="${th(ry)}"
                  fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`
      }
      // polygon (default)
      return `<polygon points="${polyPoints(zone.points)}"
                fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`
    }

    // Zone centroid for label placement
    function centroid(zone) {
      if (zone.shape === 'rect') {
        const [[x1,y1],[x2,y2]] = zone.points
        return [tx((x1+x2)/2), ty((y1+y2)/2)]
      }
      if (zone.shape === 'ellipse') {
        return [tx(zone.points[0][0]), ty(zone.points[0][1])]
      }
      const xs = zone.points.map(p => p[0])
      const ys = zone.points.map(p => p[1])
      return [tx(xs.reduce((a,b)=>a+b,0)/xs.length), ty(ys.reduce((a,b)=>a+b,0)/ys.length)]
    }

    // ── Dimension strings ─────────────────────────────────────
    let widthStr = '', depthStr = ''
    if (dimensionsInput) {
      const m = dimensionsInput.match(/(\d+\.?\d*)\s*[xX×]\s*(\d+\.?\d*)/)
      if (m) { widthStr = `${m[1]}m`; depthStr = `${m[2]}m` }
      else { widthStr = dimensionsInput }
    } else {
      widthStr = `~${plan.gardenWidth || '?'}m`
      depthStr = `~${plan.gardenDepth || '?'}m`
    }

    // ── North arrow ───────────────────────────────────────────
    const na = plan.northAngle || 0
    const nax = W - 38, nay = 38
    const rad = (na * Math.PI) / 180
    const arrowLen = 18
    const tipX = nax + Math.sin(rad) * -arrowLen
    const tipY = nay + Math.cos(rad) * -arrowLen
    const tailX = nax + Math.sin(rad) * arrowLen
    const tailY = nay + Math.cos(rad) * arrowLen
    const northArrow = `
      <line x1="${tailX}" y1="${tailY}" x2="${tipX}" y2="${tipY}" stroke="#333" stroke-width="2"/>
      <polygon points="${tipX},${tipY} ${tipX + Math.cos(rad)*6},${tipY - Math.sin(rad)*6} ${tipX - Math.cos(rad)*6},${tipY + Math.sin(rad)*6}"
               fill="#333"/>
      <text x="${nax}" y="${nay + arrowLen + 13}" text-anchor="middle" font-size="10" font-family="Georgia,serif" fill="#333" font-weight="bold">N</text>
    `

    // ── Dimension lines ───────────────────────────────────────
    const dimLineOffset = 28
    const dimLines = `
      <!-- width dimension line (bottom) -->
      <line x1="${PAD}" y1="${H - dimLineOffset + 8}" x2="${W - PAD}" y2="${H - dimLineOffset + 8}" stroke="#555" stroke-width="1"/>
      <line x1="${PAD}" y1="${H - dimLineOffset + 2}" x2="${PAD}" y2="${H - dimLineOffset + 14}" stroke="#555" stroke-width="1"/>
      <line x1="${W-PAD}" y1="${H - dimLineOffset + 2}" x2="${W-PAD}" y2="${H - dimLineOffset + 14}" stroke="#555" stroke-width="1"/>
      <text x="${W/2}" y="${H - dimLineOffset + 22}" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="#555">${widthStr}</text>
      <!-- depth dimension line (left) -->
      <line x1="${dimLineOffset - 8}" y1="${PAD}" x2="${dimLineOffset - 8}" y2="${H - PAD}" stroke="#555" stroke-width="1"/>
      <line x1="${dimLineOffset - 14}" y1="${PAD}" x2="${dimLineOffset - 2}" y2="${PAD}" stroke="#555" stroke-width="1"/>
      <line x1="${dimLineOffset - 14}" y1="${H-PAD}" x2="${dimLineOffset - 2}" y2="${H-PAD}" stroke="#555" stroke-width="1"/>
      <text x="${dimLineOffset - 22}" y="${H/2}" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="#555"
            transform="rotate(-90, ${dimLineOffset - 22}, ${H/2})">${depthStr}</text>
    `

    // ── House wall ────────────────────────────────────────────
    const houseWall = `
      <rect x="${PAD}" y="${PAD - 10}" width="${W - PAD*2}" height="10" fill="#c8b898" stroke="#8a7858" stroke-width="1.5"/>
      <text x="${W/2}" y="${PAD - 2}" text-anchor="middle" font-size="10" font-family="Georgia,serif" fill="#5a3a18" font-style="italic">House</text>
    `

    // ── Garden boundary ───────────────────────────────────────
    const boundary = `<rect x="${PAD}" y="${PAD}" width="${W - PAD*2}" height="${H - PAD*2}"
                        fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>`

    // ── Assemble all zone shapes ──────────────────────────────
    const zones = (plan.zones || [])
    const zoneShapes  = zones.map(z => zoneElement(z)).join('\n')

    // ── Zone labels ───────────────────────────────────────────
    const zoneLabels = zones.map(z => {
      const st = ZONE_STYLE[z.type] || ZONE_STYLE.structure
      const [cx, cy] = centroid(z)
      return `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="10"
                font-family="Georgia,serif" fill="${st.label}" font-weight="600"
                paint-order="stroke" stroke="white" stroke-width="2.5">${z.label}</text>`
    }).join('\n')

    // ── Plant symbols ─────────────────────────────────────────
    const plantSymbols = zones.flatMap(z => {
      if (z.type !== 'bed' || !z.plants) return []
      return z.plants.map(p => {
        const px = tx(p.x), py = ty(p.y)
        const sym = plantSymbol(p.symbol, px, py)
        const lbl = `<text x="${px}" y="${py + 13}" text-anchor="middle" font-size="7.5"
                       font-family="Georgia,serif" fill="#2a5a10" font-style="italic"
                       paint-order="stroke" stroke="white" stroke-width="2">${p.label}</text>`
        return sym + lbl
      })
    }).join('\n')

    // ── Structures ────────────────────────────────────────────
    const structs = (plan.structures || []).map(s => {
      const sx = tx(s.x), sy = ty(s.y)
      const sw = tw(s.w), sh = th(s.h)
      const rot = s.rotation || 0
      return `<g transform="rotate(${rot}, ${sx}, ${sy})">
        <rect x="${sx - sw/2}" y="${sy - sh/2}" width="${sw}" height="${sh}"
              fill="#d8c8b0" stroke="#907850" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
        <text x="${sx}" y="${sy + 4}" text-anchor="middle" font-size="9"
              font-family="Georgia,serif" fill="#503020" font-style="italic">${s.label}</text>
      </g>`
    }).join('\n')

    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`)
    svgEl.innerHTML = `
      <defs>
        <pattern id="hatch-gravel" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="#b89870" stroke-width="0.8" opacity="0.5"/>
        </pattern>
      </defs>
      <rect width="${W}" height="${H}" fill="#faf8f3"/>
      ${boundary}
      ${houseWall}
      ${zoneShapes}
      ${structs}
      ${plantSymbols}
      ${zoneLabels}
      ${dimLines}
      ${northArrow}
      <text x="${PAD}" y="${H - 8}" font-size="10" font-family="Georgia,serif" fill="#aaa" font-style="italic">Garden Design Plan — AI generated</text>
    `
    return svgEl
  }

  // ── GARDEN PLAN: LEGEND ───────────────────────────────────
  function buildPlanLegend(plan) {
    const ZONE_STYLE = {
      lawn:      { fill: '#c8ddb0', label: 'Lawn' },
      patio:     { fill: '#e8dcc8', label: 'Patio' },
      path:      { fill: '#d4c4a0', label: 'Path' },
      bed:       { fill: '#b8d4a0', label: 'Planting bed' },
      gravel:    { fill: '#ddd4b8', label: 'Gravel' },
      water:     { fill: '#b8d4e8', label: 'Water feature' },
      kids:      { fill: '#e8d8b0', label: 'Kids zone' },
      structure: { fill: '#d8c8b0', label: 'Structure' },
    }
    const seen = new Set()
    const items = (plan.zones || [])
      .filter(z => { if (seen.has(z.type)) return false; seen.add(z.type); return true })
      .map(z => {
        const st = ZONE_STYLE[z.type] || { fill: '#ccc', label: z.type }
        return `<div class="plan-legend-item">
          <div class="plan-legend-swatch" style="background:${st.fill}"></div>
          <span>${st.label}</span>
        </div>`
      }).join('')

    const plantTypes = [
      { sym: 'tree',      col: '#4a8a30', label: 'Tree' },
      { sym: 'shrub',     col: '#6aaa40', label: 'Shrub' },
      { sym: 'grass',     col: '#8ab840', label: 'Ornamental grass' },
      { sym: 'perennial', col: '#c060a0', label: 'Perennial' },
      { sym: 'climber',   col: '#5a9030', label: 'Climber' },
    ]
    const usedSymbols = new Set(
      (plan.zones || []).flatMap(z => (z.plants || []).map(p => p.symbol))
    )
    const plantItems = plantTypes
      .filter(p => usedSymbols.has(p.sym))
      .map(p => `<div class="plan-legend-item">
        <div class="plan-legend-swatch" style="background:${p.col};border-radius:50%"></div>
        <span>${p.label}</span>
      </div>`).join('')

    const div = document.createElement('div')
    div.className = 'plan-legend'
    div.innerHTML = items + plantItems
    return div
  }

          morning: 'Sun is due east at low elevation (approximately 15 degrees), 225 degrees around — behind and to the left of the viewpoint. No direct sunlight enters the garden from the front. Cool indirect early light across the garden. Long soft shadows. Pale cool sky ahead. Dew on foliage.',
          midday:  'Sun is due south at high elevation (approximately 52 degrees), 45 degrees to the left of the viewing direction. Bright near-frontal light from the left-front. Short shadows point to the right and slightly away. Very bright vivid scene. Clear blue sky.',
          evening: 'Sun is due west at low elevation (approximately 15 degrees), 45 degrees to the right of the viewing direction. Warm near-frontal raking light entering from the right-front. Long shadows point to the left and slightly away. Warm golden-hour glow on right-facing surfaces. Atmospheric amber sky to the right-front.',
        },

        'Not sure': {
          morning: 'Sun is low in the sky (approximately 15 degrees elevation). Warm golden raking light from one side. Long shadows across the lawn and path. Dew on foliage. Cool fresh atmosphere.',
          midday:  'Sun is high in the sky (approximately 52 degrees elevation). Short crisp shadows. Bright vivid colours. Clear blue sky.',
          evening: 'Sun is low in the sky (approximately 15 degrees elevation). Warm amber raking light from one side. Long shadows across the garden. Golden-hour glow. Garden lighting beginning to illuminate the path.',
        },
      }

      // Default fallback if orientation is blank or unrecognised
      const DEFAULT_LIGHTING = ORIENTATION_LIGHTING['Not sure']

      const orientationVal = document.getElementById('orientation').value || 'Not sure'
      const lighting = ORIENTATION_LIGHTING[orientationVal] || DEFAULT_LIGHTING

      const timeOfDay = [
        { id: 'slot-morning',   label: 'Morning',   description: lighting.morning },
        { id: 'slot-afternoon', label: 'Afternoon',  description: lighting.midday  },
        { id: 'slot-evening',   label: 'Evening',    description: lighting.evening },
      ]

      const grid = document.getElementById('renderGrid')
      timeOfDay.forEach(({ id, label }) => {
        const slot = document.createElement('div')
        slot.className = 'render-slot generating'
        slot.id = id
        slot.innerHTML = `<div class="spinner-lg"></div><div>${label}</div>`
        grid.appendChild(slot)
      })

      const basePhoto  = uploadedPhotos[0]
      const [morning, afternoon, evening] = timeOfDay

      // ── Step 3: Render 1 (morning) with the original photo ──
      // Uses the full transformation prompt — this establishes the design.
      const morningPrompt = buildImagePrompt(sections, styleVal, features, morning)
      console.log('Render 1 prompt:', morningPrompt)

      let render1Url
      try {
        render1Url = await generateRender(morningPrompt, basePhoto.base64)
        showSlotImage(document.getElementById(morning.id), render1Url, morning.label)
      } catch (err) {
        showSlotError(document.getElementById(morning.id), err.message)
        // Fall through — renders 2 and 3 will fall back to the original photo
      }

      setStatus('Render 1 complete. Generating renders 2 and 3...', 'loading')

      // Convert render 1 to base64 for chaining; fall back to original photo if it failed
      let chainBase64 = basePhoto.base64
      if (render1Url) {
        try {
          chainBase64 = await urlToBase64(render1Url)
        } catch (err) {
          console.warn('Could not convert render 1 for chaining, falling back to original photo:', err.message)
        }
      }

      // ── Step 4: Renders 2 and 3 in parallel, chained off render 1 ──
      // Uses a shorter re-lighting prompt since the design is already established.
      await Promise.all([afternoon, evening].map(async (tod) => {
        const slot   = document.getElementById(tod.id)
        const prompt = buildRelightPrompt(styleVal, features, tod)
        console.log(`Render (${tod.label}) prompt:`, prompt)
        try {
          const imgUrl = await generateRender(prompt, chainBase64)
          showSlotImage(slot, imgUrl, tod.label)
        } catch (err) {
          showSlotError(slot, err.message)
        }
      }))

      // ── Step 5: Generate aerial garden plan ───────────────
      setStatus('Renders complete. Generating garden plan...', 'loading')
      try {
        const planJson = await fetchGardenPlanJson(analysis, {
          dimensions: document.getElementById('dimensions').value,
          orientation: orientationVal,
          style: styleVal,
          features,
        })
        const planSection = document.createElement('div')
        planSection.className = 'result-section'
        planSection.innerHTML = '<h3>Garden Plan</h3>'
        const wrap = document.createElement('div')
        wrap.className = 'plan-wrap'
        wrap.appendChild(renderGardenPlanSVG(planJson, document.getElementById('dimensions').value))
        if (!document.getElementById('dimensions').value) {
          const note = document.createElement('div')
          note.className = 'plan-note'
          note.textContent = 'Dimensions not entered — plan proportions are approximate.'
          wrap.appendChild(note)
        }
        wrap.appendChild(buildPlanLegend(planJson))
        planSection.appendChild(wrap)
        main.appendChild(planSection)
      } catch (err) {
        console.error('Plan generation failed:', err)
        const planSection = document.createElement('div')
        planSection.className = 'result-section'
        planSection.innerHTML = `<h3>Garden Plan</h3><div class="status error">Could not generate plan: ${err.message}</div>`
        main.appendChild(planSection)
      }

      setStatus('Done.', 'success')

    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error')
      console.error(err)
    } finally {
      btn.disabled = false
    }
  }
</script>

</body>
</html>
